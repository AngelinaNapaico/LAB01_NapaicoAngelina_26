apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-pedidos
  labels:
    app: ms-pedidos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-pedidos
  template:
    metadata:
      labels:
        app: ms-pedidos
    spec:
      containers:
        - name: ms-pedidos
          image: valencia123/ms-pedidos:latest
          ports:
            - containerPort: 8082
          env:
            - name: SERVER_PORT
              value: "8082"
            - name: SPRING_R2DBC_URL
              value: "r2dbc:postgresql://ep-restless-bonus-atd7h7vc-pooler.c-9.us-east-1.aws.neon.tech/neondb?sslMode=require&channel_binding=require"
            - name: SPRING_R2DBC_USERNAME
              value: "neondb_owner"
            - name: SPRING_R2DBC_PASSWORD
              value: "npg_JFIRq1Q8EWBs"
            # ms-pedidos llama a ms-productos via DNS interno de Kubernetes
            - name: MS_PRODUCTOS_URL
              value: "http://ms-productos-service:8081"
